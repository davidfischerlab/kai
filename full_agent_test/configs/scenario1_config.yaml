# Scenario 1 Configuration
# Three cell type annotation tasks: blood (PBMC), breast cancer, lung
# Using exact prompts from kai_reproducibility

# Base notebooks from kai_reproducibility
base_notebooks_dir: "full_agent_test/base_notebooks"

# Test cases for Scenario 1
test_cases:
  - name: "blood"
    base_notebook: "full_agent_test_scenario1_blood_base.ipynb"
    task: |
      Output a Jupyter notebook in json format to address the following:

      You are given single-cell RNA-seq data from human PBMC as adata. Cells are already filtered and ready for analysis. Gene expression data is given as raw counts in adata.layer["counts"].X and as log1p-normalized in adata.X. There are multiple samples from different donors in this dataset, you can find the assignments in .obs["donor_id"] - consider this information in the analyses below: correct for this batch effect with harmony if you find that it is necessary but avoid batch effect statistics that depend on per-cell KNN statistics because those take long to compute.

      Perform a leiden clustering to use as a basis for cell type annotation. Show the downloaded models in celltypist (don't download any models). Based on that list and any information that you can find about these models, choose one that is generally applicable to immune cells and one that is specific for human PBMC. Use those models to annotate the leiden clusters with cell type labels. Then, assemble a marker gene panel from literature sources for the cell types predicted by the PBMC-specific model, matching its cell type granularity, taking care to assemble a comprehensive panel with several genes per cell type. Use that panel to compute gene expression scores for each cell type. Interpret these scores per cluster and use these scores to assign cell type labels to clusters. Conclude to what degree one can use the results from this celltypist analysis for downstream analyses by working through the agreement of celltypist with the marker gene approach - take care to account for differences in cell type naming and granularity between the different annotations. Generate one final cell type annotation for downstream analyses.
    description: "Cell type annotation on peripheral blood mononuclear cells (PBMC)"
    evaluation_stages:
      batcheffect_implementation: "Quantitative assessment of donor batch effects is performed."
      batcheffect_interpretation: "The batch effect assessment results are interpreted and an explicit decision is made about whether batch correction is necessary."
      optional_harmony_implementation: "Based on the decision, batch correction is either applied or explicitly skipped, and the appropriate embeddings are used for downstream clustering."
      leiden_clustering: "Unsupervised clustering is performed to identify discrete cell populations."
      celltypist_selection: "Appropriate cell typist models are selected (tissue-appropriate for immune/PBMC cells)."
      celltypist_implementation: "Celltypist models are loaded and annotation is performed."
      gene_set_scoring: "Marker gene expression scores are computed for relevant cell type signatures."
      gene_set_interpretation: "Gene set scores are aggregated per cluster and interpreted to infer cell type identities."
      discussion: "Final predictions are assembled and results from celltypist and gene-set-based scoring compared."

  - name: "breastcancer"
    base_notebook: "full_agent_test_scenario1_breastcancer_base.ipynb"
    task: |
      Output a Jupyter notebook in json format to address the following:

      You are given single-cell RNA-seq data from human breast cancer biopsies as adata. Cells are already filtered and ready for analysis. Gene expression data is given as raw counts in adata.layer["counts"].X and as log1p-normalized in adata.X. There are multiple samples from different donors in this dataset, you can find the assignments in .obs["donor_id"] - consider this information in the analyses below: correct for this batch effect with harmony if you find that it is necessary but avoid batch effect statistics that depend on per-cell KNN statistics because those take long to compute.

      Use tutorials on the following concepts:
      -        Basic celltypist usage from the celltypist repository.
      -        Batch effects & harmony from scverse if available.

      Perform a leiden clustering to use as a basis for cell type annotation. Show the downloaded models in celltypist (don't download any models). Based on that list and any information that you can find about these models, choose two that are applicable to this tissue. Use those models to annotate the leiden clusters with cell type labels. Then, assemble a marker gene panel from literature sources for the cell types predicted by the models, matching their cell type granularity, taking care to assemble a comprehensive panel with several genes per cell type. Use that panel to compute gene expression scores for each cell type. Interpret these scores per cluster and use these scores to assign cell type labels to clusters. Conclude to what degree one can use the results from this celltypist analysis for downstream analyses by working through the agreement of celltypist with the marker gene approach - take care to account for differences in cell type naming and granularity between the different annotations. Generate one final cell type annotation for downstream analyses.
    description: "Cell type annotation on breast cancer tissue"
    evaluation_stages:
      batcheffect_implementation: "Quantitative assessment of donor batch effects is performed."
      batcheffect_interpretation: "The batch effect assessment results are interpreted and an explicit decision is made about whether batch correction is necessary."
      optional_harmony_implementation: "Based on the decision, batch correction is either applied or explicitly skipped, and the appropriate embeddings are used for downstream clustering."
      leiden_clustering: "Unsupervised clustering is performed to identify discrete cell populations."
      celltypist_selection: "Appropriate cell typist models are selected (appropriate for breast cancer tissue: tumor + immune)."
      celltypist_implementation: "Celltypist models are loaded and annotation is performed."
      gene_set_scoring: "Marker gene expression scores are computed for relevant cell type signatures."
      gene_set_interpretation: "Gene set scores are aggregated per cluster and interpreted to infer cell type identities."
      discussion: "Final predictions are assembled and results from celltypist and gene-set-based scoring compared."

  - name: "lung"
    base_notebook: "full_agent_test_scenario1_lung_base.ipynb"
    task: |
      Output a Jupyter notebook in json format to address the following:

      You are given single-cell RNA-seq data from human lung tissue of a COVID-19 patient as adata. Cells are already filtered and ready for analysis. Gene expression data is given as raw counts in adata.layer["counts"].X and as log1p-normalized in adata.X.

      Use tutorials on the following concepts:
      -        Basic celltypist usage from the celltypist repository.
      -        Basic single-cell analysis tutorial for leiden clustering.

      Perform a leiden clustering to use as a basis for cell type annotation. Show the downloaded models in celltypist (don't download any models). Based on that list and any information that you can find about these models, choose two that are applicable to this tissue. Use those models to annotate the leiden clusters with cell type labels. Then, assemble a marker gene panel from literature sources for the cell types predicted by the models, matching their cell type granularity, taking care to assemble a comprehensive panel with several genes per cell type. Use that panel to compute gene expression scores for each cell type. Interpret these scores per cluster and use these scores to assign cell type labels to clusters. Conclude to what degree one can use the results from this celltypist analysis for downstream analyses by working through the agreement of celltypist with the marker gene approach - take care to account for differences in cell type naming and granularity between the different annotations. Generate one final cell type annotation for downstream analyses.
    description: "Cell type annotation on lung tissue (COVID-19 patient)"
    evaluation_stages:
      leiden_clustering: "Unsupervised clustering is performed."
      celltypist_selection: "Appropriate cell typist models are selected (appropriate for lung tissue)."
      celltypist_implementation: "Celltypist models are loaded and annotation is performed."
      gene_set_scoring: "Marker gene expression scores are computed for relevant cell type signatures."
      gene_set_interpretation: "Gene set scores are aggregated per cluster and interpreted to infer cell type identities."
      discussion: "Final predictions are assembled and results from celltypist and gene-set-based scoring compared."

# Execution parameters
execution:
  num_replicates: 1
  max_iterations: 100
  timeout_minutes: 120  # 2 hours per case

# LLM configuration
llm:
  provider: "ollama-turbo"
  model: null
  rag_enabled: true

# Output configuration
output:
  base_dir: "full_agent_test/test_outputs"
  naming_pattern: "full_agent_test_scenario1_{case}_repeat{replicate}"
  save_logs: true
  save_metadata: true
